<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="check">Weather Checker</h2>
    <button onclick="check()">Check</button>

    <script>
        function check() {
            let temp = parsefloat(prompt("Enter todays temperature: "))
            if (temp >= 30) {
                document.getElementById("check").innerHTML = "Hot Day!";
            }
            else {
                document.getElementById("check").innerHTML = "Plaesent Weather!";
            }
        }
    </script>
</body>
</html>
